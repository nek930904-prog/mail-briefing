name: 메일 브리핑 자동 작성

# ── 언제 실행할지 ──
on:
  schedule:
    # GitHub Actions의 cron은 'UTC(세계표준시)' 기준입니다.
    # 한국시간(KST)은 UTC보다 9시간 빠르므로 9를 빼서 적습니다.
    # 정각(:00)은 전 세계 예약이 몰려 잘 밀리므로, 15분 비켜서 :15에 실행합니다.
    #   KST 08:15  →  UTC 23:15 (전날)
    #   KST 13:15  →  UTC 04:15
    #   KST 19:15  →  UTC 10:15
    - cron: "15 23 * * *"   # 한국시간 오전 08:15
    - cron: "15 4 * * *"    # 한국시간 오후 01:15
    - cron: "15 10 * * *"   # 한국시간 오후 07:15
  # 깃허브 화면에서 '수동 실행' 버튼으로도 돌릴 수 있게 함 (테스트용으로 편리)
  workflow_dispatch:

# 실행 결과(last_run.txt)를 저장소에 다시 커밋하려면 쓰기 권한이 필요합니다.
permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      # (1) 내 저장소 코드를 가져온다
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # (2) 파이썬 설치
      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # (3) 필요한 부품(라이브러리) 설치
      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      # (4) 프로그램 실행 — 비밀값은 GitHub Secrets에서 환경변수로 주입
      - name: 브리핑 실행
        env:
          NAVER_EMAIL_1: ${{ secrets.NAVER_EMAIL_1 }}
          NAVER_APP_PASSWORD_1: ${{ secrets.NAVER_APP_PASSWORD_1 }}
          NAVER_EMAIL_2: ${{ secrets.NAVER_EMAIL_2 }}
          NAVER_APP_PASSWORD_2: ${{ secrets.NAVER_APP_PASSWORD_2 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python main.py

      # (5) 중복 방지 메모지(last_run.txt)가 바뀌었으면 저장소에 다시 커밋
      #     원격이 앞서 있어도 충돌 없이 올리도록, 매번 원격 최신 상태로 맞춘 뒤
      #     우리 last_run.txt 를 얹어서 커밋/푸시한다 (최대 3회 재시도).
      - name: 실행 시각 저장
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # 방금 만든 last_run.txt 내용을 임시 보관 (없으면 저장할 게 없으니 종료)
          cp last_run.txt "$RUNNER_TEMP/last_run.txt" 2>/dev/null || { echo "last_run.txt 없음 - 건너뜀"; exit 0; }
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main           # 원격 최신으로 맞춤
            cp "$RUNNER_TEMP/last_run.txt" last_run.txt
            git add -f last_run.txt                 # .gitignore 대상이라 -f(강제)
            if git diff --cached --quiet; then echo "변경 없음 - 건너뜀"; exit 0; fi
            git commit -m "chore: update last_run.txt [skip ci]"
            if git push origin main; then echo "저장 성공"; exit 0; fi
            echo "push 충돌 - 재시도 $i"; sleep 3
          done
          # 끝까지 실패해도 브리핑은 이미 성공했으니 워크플로우는 실패로 처리하지 않음
          echo "실행 시각 저장만 실패(브리핑은 정상). 다음 실행 때 자동 보정됨."; exit 0
